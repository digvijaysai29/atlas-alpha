name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# Least privilege by default; individual jobs/steps escalate only if/when they need to.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. repeated pushes to the same PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  workflow-lint:
    name: workflow-lint (actionlint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Lint workflow YAML (actionlint)
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  fast-fail:
    name: fast-fail (lint, types, tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup atlas
        uses: ./.github/actions/setup-atlas
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Lockfile drift (uv lock --check)
        run: uv lock --check

      - name: Package smoke (uv build)
        run: uv build

      - name: Lint (ruff check)
        run: uv run ruff check src tests scripts evals

      - name: Format check (ruff format)
        run: uv run ruff format --check src tests scripts evals

      - name: Type check (mypy)
        run: uv run mypy src tests

      - name: Test + coverage (pytest)
        run: uv run pytest --cov=atlas --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  security:
    name: security (semgrep, bandit, pip-audit, gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup atlas
        uses: ./.github/actions/setup-atlas
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Semgrep (community rulesets)
        # SEMGREP_APP_TOKEN is optional: when unset, semgrep still runs the named community
        # rulesets locally without reporting to Semgrep AppSec Platform.
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          uv run --with semgrep semgrep scan \
            --config p/python \
            --config p/security-audit \
            --config p/secrets \
            --config p/owasp-top-ten \
            --sarif-output semgrep.sarif \
            --error \
            src tests scripts evals main.py

      - name: Upload Semgrep SARIF
        if: >-
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Semgrep (atlas custom rules, advisory)
        # Log-only: no --error; findings are advisory until the codebase is clean.
        run: |
          uv run --with semgrep semgrep scan \
            --config .semgrep/atlas-security.yml \
            src tests scripts evals main.py

      - name: Bandit (static security analysis)
        run: uv run bandit -r src -q

      - name: pip-audit (dependency CVE scan)
        run: uv run pip-audit -l

      - name: Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  contracts:
    name: contracts (serde allowlist)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup atlas
        uses: ./.github/actions/setup-atlas
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: CI contract tests
        run: uv run pytest tests/test_ci_contracts.py -q

  integration:
    name: integration (postgres persistence)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atlas -d atlas"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://atlas:atlas@localhost:5432/atlas
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup atlas
        uses: ./.github/actions/setup-atlas
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Integration tests (Postgres-backed checkpointer + audit)
        run: uv run pytest -m integration

  agent-eval:
    name: agent-eval (security-behavior gate)
    needs: fast-fail
    # The deterministic gate is hermetic (no key, no network), so it runs broadly — on every push
    # and PR, including forks — not just PRs into main. The optional LangSmith quality evals inside
    # run_gate.py self-skip when the key is absent, so this is safe to run everywhere.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup atlas
        uses: ./.github/actions/setup-atlas
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run evaluation gate
        # The blocking deterministic suite needs no secrets. The keys are supplied only so the
        # optional, NON-BLOCKING LangSmith quality evals can run when available; run_gate.py never
        # echoes secret values and never lets the telemetry layer change the exit code.
        env:
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run python evals/run_gate.py
