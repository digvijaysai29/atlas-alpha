name: Release

# Phase 7a: workflow_dispatch only — build wheel + container locally; GHCR push is opt-in.
# Phase 7b (after one green manual run): enable automatic triggers:
#   push:
#     branches: [main]
#     tags: ["v*"]
# Tags on auto-push will include :sha, :main, and :v* (on tag events).
on:
  workflow_dispatch:
    inputs:
      push_image:
        type: boolean
        default: false
        description: "Push to GHCR"

permissions:
  contents: read

jobs:
  build-wheel:
    name: build-wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup atlas
        uses: ./.github/actions/setup-atlas

      - name: Build wheel and sdist
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/*
          retention-days: 90

  build-image:
    name: build-image
    needs: build-wheel
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        if: github.event.inputs.push_image == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: ${{ github.event.inputs.push_image == 'true' }}
          tags: ghcr.io/${{ github.repository }}:manual-${{ github.sha }}
