name: Release

# Phase 7a: workflow_dispatch only — build wheel + container locally; GHCR push is opt-in.
# Phase 7b (after one green manual run): enable automatic triggers:
#   push:
#     branches: [main]
#     tags: ["v*"]
# Tags on auto-push will include :sha, :main, and :v* (on tag events).
on:
  workflow_dispatch:
    inputs:
      push_image:
        type: boolean
        default: false
        description: "Push to GHCR"

permissions:
  contents: read

jobs:
  build-wheel:
    name: build-wheel
    runs-on: ubuntu-latest
    steps:
      - name: Setup atlas
        uses: ./.github/actions/setup-atlas

      - name: Build wheel and sdist
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4.6.2 # v4.6.2, pinned to a released tag (ea165f8d65b6e75b540449e92b4886f43607fa02)
        with:
          name: dist
          path: dist/*
          retention-days: 90

  build-image:
    name: build-image
    needs: build-wheel
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0 # v7.0.0, pinned to a released tag (9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.11.0 # v3.11.0, pinned to a released tag (18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0)

      - name: Log in to GHCR
        if: github.event.inputs.push_image == 'true'
        uses: docker/login-action@v3.4.0 # v3.4.0, pinned to a released tag (74a5d142397b4f367a81961eba4e8cd7edddf772)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        uses: docker/build-push-action@v7.2.0 # v7.2.0, pinned to a released tag (f9f3042f7e2789586610d6e8b85c8f03e5195baf)
        with:
          context: .
          push: ${{ github.event.inputs.push_image == 'true' }}
          tags: ghcr.io/${{ github.repository }}:manual-${{ github.sha }}
