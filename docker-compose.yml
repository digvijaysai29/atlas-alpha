# Local Postgres for atlas durable persistence (M2.1).
#   docker compose up -d
#   export DATABASE_URL=postgresql://atlas:atlas@localhost:5432/atlas
# Uses pgvector/pgvector:pg16 (postgres:16 + the `vector` extension) so the M4.6 KnowledgeGraph
# setup() (CREATE EXTENSION vector) works locally, matching CI and Neon.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas
    ports:
      - "5432:5432"
    volumes:
      - atlas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas"]
      interval: 5s
      timeout: 5s
      retries: 10

  vault:
    image: hashicorp/vault:1.17
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    command: server -dev

volumes:
  atlas_pgdata:
